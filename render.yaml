services:
  - type: web
    name: atlas-backend
    runtime: python
    plan: free
    rootDir: pakistan-orbit-tracker-main/pakistan-orbit-tracker-main/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GATE_URL
        sync: false
      - key: ADMIN_KEY
        sync: false
      - key: SPACETRACK_USER
        sync: false
      - key: SPACETRACK_PASS
        sync: false
